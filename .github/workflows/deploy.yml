name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 138.197.80.16 >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key root@138.197.80.16 "
            cd /opt/apps/docklog &&
            git fetch https://x-access-token:$GITHUB_TOKEN@github.com/billsste/Docklog.git main &&
            git reset --hard FETCH_HEAD &&
            docker compose up --build -d
          "
